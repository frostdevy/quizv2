<!-- templates/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Quiz Creator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 400px; }
        h1 { color: #333; margin-bottom: 20px; text-align: center; }
        .input-group { margin: 20px 0; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn:hover { background: #45a049; }
        .error { color: red; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Quiz Creator</h1>
        <form method="POST">
            <div class="input-group">
                <input type="password" name="password" placeholder="Wpisz hasło" required>
            </div>
            <button type="submit" class="btn">Wejdź</button>
            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}
        </form>
    </div>
</body>
</html>
